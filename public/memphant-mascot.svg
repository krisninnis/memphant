<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Body -->
  <ellipse cx="100" cy="120" rx="52" ry="46" fill="#4f8ef7"/>

  <!-- Head -->
  <circle cx="100" cy="76" r="36" fill="#4f8ef7"/>

  <!-- Left ear -->
  <ellipse cx="64" cy="74" rx="20" ry="26" fill="#6d59f0" opacity="0.85"/>
  <ellipse cx="66" cy="74" rx="13" ry="18" fill="#4f8ef7"/>

  <!-- Right ear -->
  <ellipse cx="136" cy="74" rx="20" ry="26" fill="#6d59f0" opacity="0.85"/>
  <ellipse cx="134" cy="74" rx="13" ry="18" fill="#4f8ef7"/>

  <!-- Trunk (curled up — good luck symbol) -->
  <path d="M86 102 C76 115, 66 118, 62 112 C58 106, 64 98, 72 104" stroke="#3b7ae0" stroke-width="11" stroke-linecap="round" fill="none"/>
  <path d="M86 102 C76 115, 66 118, 62 112 C58 106, 64 98, 72 104" stroke="#4f8ef7" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- Trunk tip curl -->
  <circle cx="73" cy="104" r="5" fill="#3b7ae0"/>
  <circle cx="73" cy="104" r="3.5" fill="#4f8ef7"/>

  <!-- Eyes -->
  <circle cx="88" cy="70" r="7" fill="white"/>
  <circle cx="112" cy="70" r="7" fill="white"/>
  <circle cx="90" cy="71" r="4" fill="#1a1f2e"/>
  <circle cx="114" cy="71" r="4" fill="#1a1f2e"/>
  <!-- Eye shine -->
  <circle cx="91.5" cy="69.5" r="1.5" fill="white"/>
  <circle cx="115.5" cy="69.5" r="1.5" fill="white"/>

  <!-- Smile -->
  <path d="M90 84 Q100 91 110 84" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.8"/>

  <!-- Legs -->
  <rect x="72" y="156" width="20" height="26" rx="10" fill="#3b7ae0"/>
  <rect x="108" y="156" width="20" height="26" rx="10" fill="#3b7ae0"/>

  <!-- Little tail -->
  <path d="M152 118 C162 112, 164 122, 156 124" stroke="#3b7ae0" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Memory sparkles (subtle) -->
  <circle cx="152" cy="58" r="3" fill="#6d59f0" opacity="0.6"/>
  <circle cx="160" cy="48" r="2" fill="#4f8ef7" opacity="0.5"/>
  <circle cx="144" cy="44" r="1.5" fill="#6d59f0" opacity="0.4"/>
</svg>
