<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment cancelled — Memephant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d1a;
      color: #e0e0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #12121f;
      border: 1px solid #2a2a40;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .icon {
      font-size: 56px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 26px;
      font-weight: 700;
      color: #e0e0f0;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: #a0a0b8;
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 20px;
      padding: 12px 20px;
      border-radius: 10px;
      background: #d97706;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s ease;
    }
    .back-link:hover {
      opacity: 0.9;
    }
    small {
      display: block;
      font-size: 12px;
      color: #60607a;
      margin-top: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔙</div>
    <h1>No worries — nothing was charged</h1>
    <p>You cancelled before completing payment. Your account hasn't changed.</p>
    <a class="back-link" href="https://memephant.com">Back to Memephant</a>
    <small>Questions? Email hello@memephant.com</small>
  </div>
</body>
</html>
