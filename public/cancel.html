<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment cancelled — Memphant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d1a;
      color: #e0e0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #12121f;
      border: 1px solid #2a2a40;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }
    .icon { font-size: 52px; margin-bottom: 20px; }
    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #e0e0f0;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: #a0a0b8;
      line-height: 1.6;
      margin-bottom: 10px;
    }
    small {
      display: block;
      font-size: 12px;
      color: #60607a;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">👋</div>
    <h1>No charge made</h1>
    <p>You cancelled before completing payment — nothing was charged.</p>
    <p>
      You can switch back to the Memphant app. If you'd like to upgrade later,
      just go to <strong>Settings → Cloud Backup</strong> and click the upgrade button.
    </p>
    <small>Questions? Email support@memphant.app</small>
  </div>
</body>
</html>
