<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signing you in - Memephant</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0f0f1a;
        color: #e0e0f0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }

      .card {
        background: #1a1a2e;
        border: 1px solid #2a2a50;
        border-radius: 20px;
        padding: 40px 36px;
        max-width: 400px;
        width: 100%;
        text-align: center;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
      }

      .logo { font-size: 56px; margin-bottom: 16px; line-height: 1; }

      h1 {
        font-size: 20px;
        font-weight: 700;
        color: #f0f0ff;
        margin-bottom: 8px;
      }

      .sub {
        font-size: 14px;
        color: #8fa0b8;
        line-height: 1.5;
        margin-bottom: 24px;
      }

      .status {
        font-size: 15px;
        font-weight: 600;
        padding: 14px 20px;
        border-radius: 12px;
        margin-bottom: 20px;
        transition: all 0.3s;
      }

      .status--loading { background: #16213e; color: #93c5fd; border: 1px solid #2a3f5f; }
      .status--success { background: #052e16; color: #4ade80; border: 1px solid #166534; }
      .status--error { background: #1a0e0e; color: #f87171; border: 1px solid #7f1d1d; }

      .instructions {
        display: none;
        font-size: 13px;
        color: #8fa0b8;
        background: #0f0f1a;
        border: 1px solid #2a2a50;
        border-radius: 10px;
        padding: 14px 16px;
        text-align: left;
        line-height: 1.6;
        margin-bottom: 16px;
      }

      .instructions strong { color: #f0f0ff; }

      .close-btn {
        display: none;
        width: 100%;
        padding: 12px;
        background: #d97706;
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        font-family: inherit;
        transition: background 0.15s;
        margin-bottom: 8px;
      }

      .close-btn:hover { background: #b45309; }

      .wordmark {
        margin-top: 24px;
        font-size: 12px;
        color: #3a3a5a;
      }

      .spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 2px solid #2a3f5f;
        border-top-color: #93c5fd;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        vertical-align: middle;
        margin-right: 6px;
      }

      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">M</div>
      <h1>Signing you in</h1>
      <p class="sub">Memephant is connecting your account...</p>

      <div class="status status--loading" id="status">
        <span class="spinner" id="spinner"></span>
        <span id="status-text">Verifying with Supabase...</span>
      </div>

      <div class="instructions" id="instructions"></div>
      <button class="close-btn" id="close-btn" onclick="window.close()">Close this tab and return to Memephant</button>

      <div class="wordmark">Memephant - Remember everything. Explain nothing.</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
      (async () => {
        const statusEl = document.getElementById('status');
        const statusText = document.getElementById('status-text');
        const spinnerEl = document.getElementById('spinner');
        const instrEl = document.getElementById('instructions');
        const closeBtn = document.getElementById('close-btn');

        function showSuccess(msg, instructions) {
          spinnerEl.style.display = 'none';
          statusEl.className = 'status status--success';
          statusText.textContent = msg;
          if (instructions) {
            instrEl.innerHTML = instructions;
            instrEl.style.display = 'block';
          }
          closeBtn.style.display = 'block';
        }

        function showError(msg) {
          spinnerEl.style.display = 'none';
          statusEl.className = 'status status--error';
          statusText.textContent = msg;
        }

        try {
          const SUPABASE_URL = document.querySelector('meta[name="supa-url"]')?.content
            || 'https://YOUR_PROJECT.supabase.co';
          const SUPABASE_ANON = document.querySelector('meta[name="supa-anon"]')?.content
            || 'YOUR_ANON_KEY';

          const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
            auth: { persistSession: true, autoRefreshToken: true },
          });

          const { data, error } = await supabase.auth.getSession();
          if (error) throw error;

          if (data?.session) {
            showSuccess('You are signed in.', `
              <strong>Desktop app users:</strong> Desktop browser-to-app OAuth bridging is not available yet.<br><br>
              <strong>Web users:</strong> your session is saved. You can close this tab.
            `);
            return;
          }

          const params = new URLSearchParams(window.location.search);
          const code = params.get('code');

          if (code) {
            const { data: exchanged, error: exchErr } = await supabase.auth.exchangeCodeForSession(code);
            if (exchErr) throw exchErr;

            if (exchanged?.session) {
              showSuccess('You are signed in.', `
                <strong>Desktop app users:</strong> Desktop browser-to-app OAuth bridging is not available yet.<br><br>
                <strong>Web users:</strong> your session is saved. You can close this tab.
              `);
              return;
            }

            showError('Could not establish a session. Please try signing in again.');
            return;
          }

          const hash = new URLSearchParams(window.location.hash.replace('#', ''));
          const token = hash.get('access_token');
          if (token) {
            showSuccess('You are signed in.', `
              <strong>Desktop app users:</strong> Desktop browser-to-app OAuth bridging is not available yet.
            `);
            return;
          }

          showError('No session was received. Please go back and try again.');
        } catch (err) {
          console.error('[Memephant] Auth callback error:', err);
          showError('Something went wrong: ' + (err.message || String(err)));
        }
      })();
    </script>
  </body>
</html>
