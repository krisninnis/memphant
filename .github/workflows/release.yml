name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-13
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── Auto-updater signing (REQUIRED for in-app updates to work) ──────
          # Add these in: GitHub repo → Settings → Secrets → Actions
          #
          #   TAURI_SIGNING_PRIVATE_KEY  →  the contents of your .key file
          #                                 (the long base64 string, not the .pub)
          #   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  →  the password you set when
          #                                          running signer generate
          #
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # ── Apple notarisation (macOS only — needed for Gatekeeper) ─────────
          # Uncomment when you have an Apple Developer account:
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Project Brain ${{ github.ref_name }}'
          releaseBody: |
            ## What changed
            See [CHANGELOG.md](https://github.com/krisninnis/project-brain/blob/main/CHANGELOG.md) for details.

            ## Install
            - **Windows:** Download the `.msi` or `.exe` installer below
            - **macOS (Apple Silicon):** Download the `aarch64.dmg`
            - **macOS (Intel):** Download the `x64.dmg`
            - **Linux:** Download the `.AppImage` or `.deb` package

            > Your project data is stored locally. This update does not affect your existing projects.
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          args: --target ${{ matrix.target }}
