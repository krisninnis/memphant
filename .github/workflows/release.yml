name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Run tests before building release artifacts — fail fast before spending CI time on builds.
  test:
    name: Test & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm exec eslint src --ext .ts,.tsx --max-warnings 0

      - name: Unit tests
        run: pnpm exec jest --passWithNoTests

  build:
    name: Build — ${{ matrix.platform }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Memephant ${{ github.ref_name }}'
          releaseBody: |
            ## What's new in ${{ github.ref_name }}

            <!-- Fill in the changelog before publishing this draft -->

            ## How to install
            - **Windows** — download the `.msi` installer below and run it
            - **macOS** — download the `.dmg`, open it, drag Memephant to Applications
            - **Linux** — download the `.AppImage` (run as-is) or `.deb` (install with dpkg)

            ## Updating from an older version
            The app will offer to update automatically via Settings → About → Check for updates.
            Your existing projects are stored locally and will not be affected by this update.

            ## Having issues?
            Open a bug report at https://github.com/krisninnis/memphant/issues
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          args: --target ${{ matrix.target }}

  # Verify the GitHub release was created with all expected assets
  verify-release:
    name: Verify release assets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.ref_name }}
          echo "Verifying release assets for $TAG..."
          RELEASE=$(gh api repos/${{ github.repository }}/releases/tags/$TAG)
          ASSET_COUNT=$(echo "$RELEASE" | jq '.assets | length')
          echo "Found $ASSET_COUNT release assets"
          # Expect at least 3 platform artifacts + update manifests
          if [ "$ASSET_COUNT" -lt 3 ]; then
            echo "ERROR: Expected at least 3 release assets, found $ASSET_COUNT"
            exit 1
          fi
          echo "✅ Release $TAG looks complete"