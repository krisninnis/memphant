<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- PWA + Mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Project Brain" />

    <!-- SEO / description -->
    <meta name="description" content="Carry your project memory between AI tools — local-first, private by default." />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/brain-icon.svg" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <title>Project Brain</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker for PWA / offline support
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/sw.js')
            .then(function (reg) {
              // Check for updates every time the app is focused
              document.addEventListener('visibilitychange', function () {
                if (document.visibilityState === 'visible') {
                  reg.update().catch(function () {});
                }
              });
            })
            .catch(function () {
              // SW registration failed — app still works, just no offline support
            });
        });
      }
    </script>
  </body>
</html>
