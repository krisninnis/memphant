<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- PWA + Mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Memephant" />

    <!-- SEO / description -->
    <meta name="description" content="Carry your project memory between AI tools — local-first, private by default." />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="/icons/icon-192-v2.png" />
    <!-- 180px is the size iOS Safari uses for "Add to Home Screen" icons -->
    <link rel="apple-touch-icon" href="/icons/icon-180-v2.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180-v2.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192-v2.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512-v2.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <title>Memephant</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register service worker for PWA / offline support.
      // Deliberately skipped inside Tauri: the app is fully bundled so offline
      // caching is unnecessary, and the SW's clients.claim() call causes it to
      // intercept Tauri's asset protocol mid-navigation on first launch,
      // preventing React from mounting (blank screen until Ctrl+R).
      var isTauri = typeof window !== 'undefined' && !!(window.__TAURI_INTERNALS__);
      if ('serviceWorker' in navigator && !isTauri) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/sw.js')
            .then(function (reg) {
              // Check for updates every time the app is focused
              document.addEventListener('visibilitychange', function () {
                if (document.visibilityState === 'visible') {
                  reg.update().catch(function () {});
                }
              });
            })
            .catch(function () {
              // SW registration failed — app still works, just no offline support
            });
        });
      }
    </script>
  </body>
</html>
